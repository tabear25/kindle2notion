<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle2Notion Web Controller</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #020617;
            --color-bg-surface: #1e293b;
            --color-bg-muted: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-text-accent: #38bdf8;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-warning: #f59e0b;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-base: #ffffff;
                --color-bg-elevated: #f8fafc;
                --color-bg-surface: #f1f5f9;
                --color-bg-muted: #e2e8f0;
                --color-text-primary: #0f172a;
                --color-text-secondary: #475569;
                --color-text-muted: #64748b;
                --color-text-accent: #0284c7;
                --color-primary: #0284c7;
                --color-primary-hover: #0369a1;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--color-bg-elevated);
            padding: 24px 0;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--color-bg-muted);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        .card {
            background: var(--color-bg-surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--color-bg-muted);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            background: var(--color-bg-base);
            border: 1px solid var(--color-bg-muted);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        input[type="password"]::placeholder {
            color: var(--color-text-muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-bg-base);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--color-primary-hover);
        }

        .btn-secondary {
            background: var(--color-bg-muted);
            color: var(--color-text-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--color-bg-surface);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-idle {
            background: var(--color-bg-muted);
            color: var(--color-text-secondary);
        }

        .status-running {
            background: rgba(59, 130, 246, 0.2);
            color: var(--color-primary);
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-error);
        }

        .log-container {
            background: var(--color-bg-base);
            border: 1px solid var(--color-bg-muted);
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .log-entry {
            padding: 4px 0;
            color: var(--color-text-secondary);
            word-break: break-word;
        }

        .log-entry.info {
            color: var(--color-primary);
        }

        .log-entry.success {
            color: var(--color-success);
        }

        .log-entry.error {
            color: var(--color-error);
        }

        .log-entry.warning {
            color: var(--color-warning);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--color-bg-base);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-primary-hover));
            width: 0%;
            transition: width 0.3s ease;
        }

        .highlight-preview {
            background: var(--color-bg-base);
            border: 1px solid var(--color-bg-muted);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .highlight-title {
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .highlight-content {
            color: var(--color-text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .highlight-page {
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .help-text {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-bg-muted);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-bg-muted);
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--color-primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 24px;
            }

            .card {
                padding: 16px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 Kindle2Notion Web Controller</h1>
            <p class="subtitle">Kindleのハイライトを簡単にNotionとGoogleスプレッドシートへ保存</p>
        </div>
    </header>

    <div class="container">
        <!-- 実行カード -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">▶️ 実行</h2>
                <span id="runStatus" class="status-badge status-idle">待機中</span>
            </div>

            <div class="form-group">
                <label for="bookLimit">取得する書籍数</label>
                <input type="number" id="bookLimit" placeholder="空欄で全冊取得" min="1" style="width: 200px;">
                <p class="help-text">空欄の場合、すべての書籍を取得します</p>
            </div>

            <div id="twoFactorSection">
                <div class="form-group">
                    <label for="twoFactorCode">二段階認証コード（必要な場合のみ入力）</label>
                    <input type="text" id="twoFactorCode" placeholder="6桁のコードを入力" maxlength="6" style="width: 200px; font-size: 18px; letter-spacing: 4px; text-align: center;">
                    <p class="help-text">二段階認証が要求された場合、Amazonから送信された認証コードを入力してください</p>
                </div>
                <button class="btn btn-primary" onclick="submitTwoFactorCode()">
                    ✓ 認証コードを送信
                </button>
            </div>

            <div id="progressContainer" style="display: none;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="runBtn" onclick="runScript()">
                    ▶️ 実行開始
                </button>
                <button class="btn btn-secondary" id="stopBtn" onclick="stopScript()" disabled>
                    ⏹️ 停止
                </button>
            </div>
        </div>

        <!-- ログカード -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📋 実行ログ</h2>
                <button class="btn btn-secondary" onclick="clearLog()" style="padding: 6px 12px; font-size: 12px;">
                    クリア
                </button>
            </div>
            <div id="logContainer" class="log-container">
                <div class="log-entry">ログがここに表示されます...</div>
            </div>
        </div>

        <!-- プレビューカード -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">👁️ ハイライトプレビュー</h2>
                <span id="highlightCount" class="status-badge status-idle">0件</span>
            </div>
            <div id="previewContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📖</div>
                    <p>実行後、取得したハイライトがここに表示されます</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let waitingForTwoFactor = false;

        function submitTwoFactorCode() {
            const code = document.getElementById('twoFactorCode').value;
            
            if (!code || code.length !== 6) {
                addLog('エラー: 6桁の認証コードを入力してください', 'error');
                return;
            }

            addLog('認証コードを送信しています...', 'info');
            
            // ここで実際のAPIにコードを送信
            // 仮実装：2秒後に成功として続行
            setTimeout(() => {
                addLog('認証成功！処理を続行します', 'success');
                document.getElementById('twoFactorCode').value = '';
                waitingForTwoFactor = false;
                continueScraping();
            }, 2000);
        }

        function continueScraping() {
            // 認証後のスクレイピング処理を続行
            const remainingSteps = [
                { delay: 2000, progress: 60, message: '書籍リストを取得中...', type: 'info' },
                { delay: 2500, progress: 75, message: 'ハイライトを抽出中...', type: 'info' },
                { delay: 1500, progress: 85, message: 'Notionに保存中...', type: 'info' },
                { delay: 1500, progress: 95, message: 'Google スプレッドシートに保存中...', type: 'info' },
                { delay: 1000, progress: 100, message: '完了しました！', type: 'success' }
            ];

            executeSteps(remainingSteps, 0);
        }

        function executeSteps(steps, currentStep) {
            if (!isRunning || currentStep >= steps.length) {
                if (isRunning) {
                    finishProcess();
                }
                return;
            }

            const step = steps[currentStep];
            setTimeout(() => {
                document.getElementById('progressFill').style.width = step.progress + '%';
                addLog(step.message, step.type);
                
                if (step.progress === 100) {
                    generateSampleHighlights();
                }
                
                currentStep++;
                executeSteps(steps, currentStep);
            }, step.delay);
        }

        // スクリプト実行のシミュレーション
        let isRunning = false;
        let currentProcess = null;

        function runScript() {
            if (isRunning) return;

            const bookLimit = document.getElementById('bookLimit').value;

            isRunning = true;
            document.getElementById('runBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('runStatus').className = 'status-badge status-running';
            document.getElementById('runStatus').innerHTML = '<span class="spinner"></span> 実行中';
            document.getElementById('progressContainer').style.display = 'block';

            const bookLimitText = bookLimit ? `${bookLimit}冊` : '全冊';
            addLog(`Kindle2Notionを起動しています... (対象: ${bookLimitText})`, 'info');
            
            simulateProcess();
        }

        function simulateProcess() {
            const initialSteps = [
                { delay: 1000, progress: 10, message: 'Amazonへログイン中...', type: 'info' },
                { delay: 2000, progress: 25, message: 'ログイン成功', type: 'success' },
                { delay: 1500, progress: 40, message: 'Kindleハイライトページにアクセス中...', type: 'info' }
            ];

            executeSteps(initialSteps, 0);

            // 二段階認証のシミュレーション（50%の確率で発生）
            setTimeout(() => {
                if (Math.random() > 0.5 && isRunning) {
                    addLog('二段階認証が要求されました', 'warning');
                    document.getElementById('twoFactorCode').focus();
                    waitingForTwoFactor = true;
                } else {
                    continueScraping();
                }
            }, 4500);
        }

        function finishProcess() {
            isRunning = false;
            document.getElementById('runBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('runStatus').className = 'status-badge status-success';
            document.getElementById('runStatus').textContent = '完了';

            setTimeout(() => {
                document.getElementById('runStatus').className = 'status-badge status-idle';
                document.getElementById('runStatus').textContent = '待機中';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressContainer').style.display = 'none';
            }, 3000);
        }

        function stopScript() {
            if (!isRunning) return;
            
            isRunning = false;
            document.getElementById('runBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('runStatus').className = 'status-badge status-error';
            document.getElementById('runStatus').textContent = '停止';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressContainer').style.display = 'none';
            
            addLog('処理を停止しました', 'warning');

            setTimeout(() => {
                document.getElementById('runStatus').className = 'status-badge status-idle';
                document.getElementById('runStatus').textContent = '待機中';
            }, 2000);
        }

        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('ja-JP');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '<div class="log-entry">ログがここに表示されます...</div>';
        }

        function generateSampleHighlights() {
            const sampleData = [
                {
                    title: 'サンプル書籍1',
                    content: 'これは取得されたハイライトのサンプルテキストです。実際の実行時には、Kindleから取得した実際のハイライトが表示されます。',
                    page: 'Page 42'
                },
                {
                    title: 'サンプル書籍1',
                    content: '重要な洞察や学びがここに表示されます。マーカーでハイライトした部分が自動的に取得されます。',
                    page: 'Page 87'
                },
                {
                    title: 'サンプル書籍2',
                    content: '複数の書籍からハイライトを一括で取得できます。効率的に読書メモを整理できます。',
                    page: 'Page 15'
                }
            ];

            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = '';

            sampleData.forEach(highlight => {
                const highlightDiv = document.createElement('div');
                highlightDiv.className = 'highlight-preview';
                highlightDiv.innerHTML = `
                    <div class="highlight-title">${highlight.title}</div>
                    <div class="highlight-content">${highlight.content}</div>
                    <div class="highlight-page">${highlight.page}</div>
                `;
                previewContainer.appendChild(highlightDiv);
            });

            document.getElementById('highlightCount').textContent = `${sampleData.length}件`;
            document.getElementById('highlightCount').className = 'status-badge status-success';
        }

        // 初期化
        window.addEventListener('DOMContentLoaded', function() {
            addLog('アプリケーションを起動しました', 'success');
            addLog('環境変数（config/KEYS.env）の設定を確認してください', 'info');
        });
    </script>
</body>
</html>
