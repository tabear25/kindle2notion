# Render Blueprint for kindle2notion (Docker web service).
#
# Deploy:
#   1. Commit Dockerfile / .dockerignore / render.yaml and push to GitHub.
#   2. In the Render dashboard: New + -> Blueprint -> pick this repository.
#   3. Render reads this file and prompts you to fill in every env var
#      marked "sync: false" (secrets are never stored in Git).
#
# Full step-by-step guide: deploy/render/README.md
services:
  - type: web
    name: kindle2notion
    runtime: docker
    region: singapore           # closest Render region to Japan
    plan: free                  # free instances sleep after 15 min idle
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # --- Required ---------------------------------------------------
      - key: AMAZON_EMAIL
        sync: false
      - key: AMAZON_PASSWORD
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      # --- Web UI login (set these: the service is on the public internet)
      - key: WEB_USERNAME
        sync: false
      - key: WEB_PASSWORD
        sync: false
      # --- Turso (operational store) -----------------------------------
      # Persists the Amazon session across restarts (no more 2FA per cold
      # start on the free plan) and caches the Notion dedup keys.
      # Leave blank to fall back to an ephemeral local SQLite file.
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # --- Vercel frontend ---------------------------------------------
      # Exact origin of the static frontend, e.g. https://kindle2notion.vercel.app
      # Leave blank if you only use the Render-served UI (same origin).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # --- Optional: Google Sheets export (leave blank to disable) ----
      - key: GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      # --- Runtime ----------------------------------------------------
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SCRAPE_MODE
        value: "xhr"            # "dom" forces the legacy click-driven scraper

    # ----------------------------------------------------------------
    # Persistent disk — no longer needed: with TURSO_* set, the Amazon
    # session (storage_state.json) is restored from Turso after every
    # restart/redeploy, so the free plan works without re-doing 2FA.
    #
    # Attach a disk only if you prefer file-based persistence instead of
    # Turso (paid plans only). Then also set:
    #   - key: STORAGE_STATE_PATH
    #     value: /var/data/storage_state.json
    #   - key: K2N_LOCAL_DB_PATH
    #     value: /var/data/local_store.db
    #
    # disk:
    #   name: kindle2notion-data
    #   mountPath: /var/data
    #   sizeGB: 1
